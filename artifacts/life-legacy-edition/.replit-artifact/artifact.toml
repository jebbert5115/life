kind = "web"
previewPath = "/"
title = "Life™ - Legacy Edition"
version = "1.0.0"
id = "artifacts/life-legacy-edition"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19970

[services.development]
run = "pnpm --filter @workspace/life-legacy-edition run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-legacy-edition", "run", "build" ]
publicDir = "artifacts/life-legacy-edition/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19970"
BASE_PATH = "/"
